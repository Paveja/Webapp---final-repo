revolte:
  version: '1.0'
  project: Prod Test
  appName: Webapp
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
    codeQuality:
      codeStyle:
        rules:
          typescript/arrayType: warn
          typescript/awaitThenable: warn
          typescript/banTsComment: error
          typescript/banTslintComment: warn
          typescript/consistentGenericConstructors: error
          typescript/consistentIndexedObjectStyle: warn
          typescript/consistentTypeAssertions: warn
          typescript/consistentTypeExports: error
          typescript/consistentTypeImports: warn
      excludes:
        - vite.config.ts
        - '**/*.js'
        - . **/*.cjs
      includes:
        - src/**/*
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      branch: Test-branch
      codeReview: true
      codeQuality: true
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    qa:
      branch: Test-branch
      codeReview: true
      codeQuality: true
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    production:
      branch: main
      codeReview: true
      codeQuality: true
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    preview:
      codeReview: true
      codeQuality: true
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
